version: "3.9"

x-backend-env: &backend-env
  ENV: ${ENV:-development}
  DEBUG: ${DEBUG:-true}
  SECRET_KEY: ${SECRET_KEY:-change-me-in-production-please-use-a-long-random-string}
  LOG_JSON: ${LOG_JSON:-true}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  POSTGRES_USER: ${POSTGRES_USER:-cacheflow}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cacheflow}
  POSTGRES_DB: ${POSTGRES_DB:-cacheflow}
  POSTGRES_HOST: postgres
  POSTGRES_REPLICA_HOST: postgres_replica
  POSTGRES_PORT: 5432
  REDIS_HOST: redis
  REDIS_PORT: 6379
  URL_CACHE_TTL_SECONDS: ${URL_CACHE_TTL_SECONDS:-3600}
  RABBITMQ_HOST: rabbitmq
  RABBITMQ_PORT: 5672
  RABBITMQ_MANAGEMENT_PORT: 15672
  RABBITMQ_USER: ${RABBITMQ_USER:-cacheflow}
  RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-cacheflow}
  RATE_LIMIT_CREATE_MAX: ${RATE_LIMIT_CREATE_MAX:-30}
  RATE_LIMIT_CREATE_WINDOW_SECONDS: ${RATE_LIMIT_CREATE_WINDOW_SECONDS:-60}
  RATE_LIMIT_REDIRECT_MAX: ${RATE_LIMIT_REDIRECT_MAX:-100}
  RATE_LIMIT_REDIRECT_WINDOW_SECONDS: ${RATE_LIMIT_REDIRECT_WINDOW_SECONDS:-60}
  SHORT_URL_BASE: ${SHORT_URL_BASE:-http://13.49.57.61.nip.io:8080}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,http://13.49.57.61.nip.io:3000}
  OTEL_ENABLED: ${OTEL_ENABLED:-false}
  OTEL_SERVICE_NAME: cacheflow-api
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cacheflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cacheflow}
      POSTGRES_DB: ${POSTGRES_DB:-cacheflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cacheflow}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [cacheflow]

  postgres_replica:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cacheflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cacheflow}
      POSTGRES_DB: ${POSTGRES_DB:-cacheflow}
      PGDATA: /var/lib/postgresql/data/replica
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
      - ./init-replica/replica-entrypoint.sh:/usr/local/bin/replica-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/replica-entrypoint.sh"]
    command: ["postgres"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cacheflow}"]
      interval: 5s
      timeout: 5s
      retries: 10
    depends_on:
      postgres: { condition: service_healthy }
    networks: [cacheflow]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [cacheflow]

  redis_exporter:
    image: oliver006/redis_exporter:latest
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis: { condition: service_healthy }
    networks: [cacheflow]

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-cacheflow}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-cacheflow}
    volumes:
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [cacheflow]

  backend_1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      <<: *backend-env
    depends_on:
      postgres: { condition: service_healthy }
      postgres_replica: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks: [cacheflow]

  backend_2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      <<: *backend-env
    depends_on:
      postgres: { condition: service_healthy }
      postgres_replica: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks: [cacheflow]

  lb:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/lb.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - backend_1
      - backend_2
    networks: [cacheflow]

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    environment:
      <<: *backend-env
    depends_on:
      postgres: { condition: service_healthy }
      postgres_replica: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks: [cacheflow]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    ports:
      - "3000:80"
    depends_on:
      - lb
    networks: [cacheflow]

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    depends_on:
      - backend_1
      - backend_2
    networks: [cacheflow]

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: cacheflow
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks: [cacheflow]

volumes:
  postgres_data:
  postgres_replica_data:
  prometheus_data:
  grafana_data:

networks:
  cacheflow:
    driver: bridge

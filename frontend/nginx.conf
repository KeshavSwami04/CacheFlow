server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # SPA client-side routing: any unmatched app route falls back to index.html.
    # Short links (GET /{code}) are NOT served through this container — they
    # resolve directly against the backend load balancer, which is what
    # SHORT_URL_BASE points at. See DEPLOYMENT.md for the single-domain
    # alternative if you want short links on the same host as the app.
    location / {
        try_files $uri /index.html;
    }

    location /api/ {
        proxy_pass http://lb/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~* \.(?:js|css|svg|png|jpg|jpeg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}

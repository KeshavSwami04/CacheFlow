# Load balancer in front of the stateless FastAPI replicas.
#
# This is the literal "Edge / Load Balancer" box from ARCHITECTURE.md's
# system diagram. Two backend replicas (backend_1, backend_2) are listed
# explicitly here rather than relying on Docker's embedded DNS round-robin,
# so the load-balancing behavior is deterministic and easy to demonstrate
# locally. In a cloud deployment this nginx tier would typically be
# replaced by a managed load balancer (ALB, GCLB, etc.) — see
# DEPLOYMENT.md for the swap-in path.

upstream backend_pool {
    least_conn;
    server backend_1:8000 max_fails=3 fail_timeout=10s;
    server backend_2:8000 max_fails=3 fail_timeout=10s;
}

server {
    listen 80;
    server_name _;

    # /api/* and the redirect catch-all both go to the API pool.
    location / {
        proxy_pass http://backend_pool;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_connect_timeout 3s;
        proxy_read_timeout 10s;
    }

    location /lb-health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}

global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: "cacheflow-api"
    static_configs:
      - targets: ["backend_1:8000", "backend_2:8000"]
    metrics_path: /metrics

  - job_name: "rabbitmq"
    static_configs:
      - targets: ["rabbitmq:15692"]
    metrics_path: /metrics

  - job_name: "redis"
    static_configs:
      - targets: ["redis_exporter:9121"]
    metrics_path: /metrics

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
